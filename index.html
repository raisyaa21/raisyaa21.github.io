<!DOCTYPE html>
<html>
<head>
    <title>PROGRAM KALKULATOR</title>

    <style>
        body {
            background: #f0f0f0;
            font-family: Arial;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .kalkulator {
            background: white;
            padding: 20px;
            border-radius: 20px;
            border: 2px solid #333;
            width: 320px;   /* bikin ukuran tetap */
        }

        #display {
            width: 100%;
            height: 60px;
            font-size: 28px;
            text-align: right;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 12px;
            border: 2px solid #333;
            box-sizing: border-box;
        }

        table {
            width: 100%;
            border-spacing: 8px;
}

        button {
            width: 100%;
            height: 60px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 12px;
            border: 1px solid #333;
            background: #e8f4ff;
            cursor: pointer;
}
    </style>
</head>

<body>

<div class="kalkulator">
    <input id="display" type="text" readonly>

    <table>
        <tr>
            <td colspan="3">
                <button onclick="clearDisplay()" style="width:100%">C</button>
            </td>
            <td><button onclick="append('/')">/</button></td>
        </tr>

        <tr>
            <td><button onclick="append('7')">7</button></td>
            <td><button onclick="append('8')">8</button></td>
            <td><button onclick="append('9')">9</button></td>
            <td><button onclick="append('*')">*</button></td>
        </tr>

        <tr>
            <td><button onclick="append('4')">4</button></td>
            <td><button onclick="append('5')">5</button></td>
            <td><button onclick="append('6')">6</button></td>
            <td><button onclick="append('-')">-</button></td>
        </tr>

        <tr>
            <td><button onclick="append('1')">1</button></td>
            <td><button onclick="append('2')">2</button></td>
            <td><button onclick="append('3')">3</button></td>
            <td><button onclick="append('+')">+</button></td>
        </tr>

        <tr>
            <td><button onclick="append('.')">.</button></td>
            <td><button onclick="append('0')">0</button></td>
            <td colspan="2">
                <button onclick="calculate()" style="width:100%">=</button>
            </td>
        </tr>
    </table>
</div>

<script>
    function append(value) {
        document.getElementById("display").value += value;
    }

    function clearDisplay() {
        document.getElementById("display").value = "";
    }

    function calculate() {
        let ekspresi = document.getElementById("display").value;
        document.getElementById("display").value = eval(ekspresi);
    }
</script>

</body>
</html>
